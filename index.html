<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Company Leave/Off Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css"></head>
    <link rel="stylesheet" href="calendar.css">
<body>

<div class="header">
    <img src="bg.jpg" class="logo" alt="Company Logo">
    <h1>Leave/Off Tracker</h1>
</div>
<!-- Login Section -->
<div id="userSection" class="card">
    <h2>Enter your FULL NAME in CAPS</h2>
    <input id="searchInput" placeholder="e.g FABIUS TAN CHOON KEONG">
    <div id="recentLogins"></div>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
    <button class="login-btn" onclick="searchUser()">Login</button>

    <div id="userInfo"></div>
</div>

<!-- Request Form (Employee) -->
<div id="formSection" class="card hidden">
    <div id="requestChoice">
        <h2>Select Request Type</h2>
        <button onclick="chooseType('Leave')" class="typeBtn leaveBtn">Apply Leave</button>
        <button onclick="chooseType('Off')" class="typeBtn offBtn">Apply Off</button>
    </div>

    <div id="requestForm" class="hidden">
        <h2 id="formTitle">Submit Request</h2>

        <label>Date Range</label>
        <div class="dates">
            <input type="date" id="start">
            <input type="date" id="end">
        </div>

        <label>Reason</label>
        <textarea id="reason" placeholder="e.g Family Holiday to South Korea"></textarea>

        <button id="submitBtn" class="submitBtn" onclick="submitRequest()">
            <span id="submitText">Submit Request</span>
            <span id="spinner" class="spinner hidden"></span>
        </button>
    </div>
</div>

<div id="myRequestsPanel" class="teamContainer hidden">
    <div id="myRequestsHeader" class="teamHeader" style="cursor:pointer;">
      <h3>MY REQUESTS</h3>
      <span id="myRequestsCount" class="pendingBadge">0</span>
    </div>
  
    <div id="myRequestsBody" class="teamRequests hidden">
      <div class="card" style="box-shadow:none;margin:0;padding:12px;">
        <label>Search (reason / type / status)</label>
        <input id="mySearchText" placeholder="e.g. holiday, medical, leave...">
  
        <label>Filter by date</label>
        <div class="dates">
          <input type="date" id="myFromDate">
          <input type="date" id="myToDate">
        </div>
  
        <label>Status</label>
        <select id="myStatus">
          <option value="">All</option>
          <option value="Pending">Pending</option>
          <option value="Approved">Approved</option>
          <option value="Rejected">Rejected</option>
        </select>
  
        <label>Type</label>
        <select id="myType">
          <option value="">All</option>
          <option value="Leave">Leave</option>
          <option value="Off">Off</option>
        </select>
  
        <button type="button" class="login-btn" id="myClearFilters">Clear Filters</button>
      </div>
  
      <div id="myRequestsList"></div>
    </div>
  </div>

<!-- Admin Panel -->
<div id="adminSection" class="card hidden">
    <h2>Admin Approval Panel</h2>

    <!-- Scrollable User List -->
    <div id="UserList" class="scroll-list"></div>

    <!-- Requests -->
    <div id="requests"></div>

    <div id="calendarSection">
        <h3>Leave Calendar</h3>
    
        <!-- Team legend -->
        <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#6366f1"></div>HQ</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#10b981"></div>Team 1</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f59e0b"></div>Team 2</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ef4444"></div>Team 3</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ccc;outline:2px dashed #999;outline-offset:-2px"></div>Pending</div>
        </div>
    
        <!-- View toggle -->
        <div class="cal-tabs">
            <button class="cal-tab cal-tab-active" id="calTabMonth" onclick="setCalView('month')">Monthly</button>
            <button class="cal-tab" id="calTabWeek" onclick="setCalView('week')">Weekly</button>
        </div>
    
        <!-- Calendar renders here -->
        <div id="calendarWrap"></div>
    </div>
</div>

<script src="script.js"></script>
<button id="floatingHome" onclick="goHome()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 3l9 8h-3v9h-12v-9h-3z"/>
    </svg>
</button>

<script src="calendar.js"></script>
</body>
</html>
