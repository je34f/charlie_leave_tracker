<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie Company Leave/Off Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://rsms.me/">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <link rel="stylesheet" href="pin.css">
    <link rel="icon" href="data:,">
</head>
<body>

<div class="header">
    <img src="bg.jpg" class="logo" alt="Company Logo">
    <h1>Leave/Off Tracker</h1>
</div>
<!-- Login Section -->
<div id="userSection" class="card">
    <h2>Enter your FULL NAME in CAPS</h2>
    <input id="searchInput" placeholder="e.g FABIUS TAN CHOON KEONG">
    <div id="recentLogins"></div>
    <div id="searchDropdown" class="search-dropdown hidden"></div>
    <button class="login-btn" onclick="initiateLogin(document.getElementById('searchInput').value)">Login</button>
    <div id="userInfo"></div>
</div>

<!-- Add User Form -->
<div id="addUserForm" class="card hidden" style="margin-bottom:12px;padding:16px;">
    <h3 style="margin:0 0 12px;font-size:16px;font-weight:700;">Add New Personnel</h3>
    <input id="newUserName" placeholder="Full name in CAPS" style="text-transform:uppercase;">
    <select id="newUserTeam">
        <option value="">Select Team</option>
        <option value="HQ">HQ</option>
        <option value="1">Team 1</option>
        <option value="2">Team 2</option>
        <option value="3">Team 3</option>
    </select>
    <input id="newUserLeave" type="number" placeholder="Starting leave balance" min="0" max="30">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;width:auto;font-weight:600;font-size:14px;">
        <input type="checkbox" id="newUserIsAdmin" style="width:auto;margin:0;">
        Grant admin access
    </label>
    <button onclick="addNewUser()" class="login-btn" style="background:#222;">Add Personnel</button>
</div>


<!-- User Profile Banner (shown after login) -->
<div id="userBanner" class="user-banner hidden">
    <div class="banner-avatar" id="bannerAvatar"></div>
    <div class="banner-info">
        <div class="banner-name" id="bannerName"></div>
        <div class="banner-team" id="bannerTeam"></div>
    </div>
    <div class="banner-leave">
        <div class="banner-leave-count" id="bannerLeaveCount"></div>
        <div class="banner-leave-label">days left</div>
    </div>
</div>


<!-- Request Form (Employee) -->
<div id="formSection" class="card hidden">
    <div id="requestChoice">
        <h2>Select Request Type</h2>
        <button onclick="chooseType('Leave')" class="typeBtn leaveBtn">Apply Leave</button>
        <button onclick="chooseType('Off')" class="typeBtn offBtn">Apply Off</button>
    </div>

    <div id="halfDayRow" class="hidden">
        <label>Duration</label>
        <select id="halfDay">
            <option value="full">Full Day</option>
            <option value="AM">AM (Morning)</option>
            <option value="PM">PM (Afternoon)</option>
        </select>
    </div>

    <div id="requestForm" class="hidden">
        <h2 id="formTitle">Submit Request</h2>

        <label>Date Range</label>
        <div class="dates">
            <input type="date" id="start">
            <input type="date" id="end">
        </div>

        <label>Reason</label>
        <textarea id="reason" placeholder="e.g Family Holiday to South Korea"></textarea>

        <button id="submitBtn" class="submitBtn" onclick="submitRequest()">
            <span id="submitText">Submit Request</span>
            <span id="spinner" class="spinner hidden"></span>
        </button>
    </div>
</div>

<div id="myRequestsPanel" class="teamContainer hidden">
    <div id="myRequestsHeader" class="teamHeader" style="cursor:pointer;">
      <h3>MY REQUESTS</h3>
      <span id="myRequestsCount" class="pendingBadge">0</span>
    </div>
  
    <div id="myRequestsBody" class="teamRequests hidden">
      <div class="card" style="box-shadow:none;margin:0;padding:12px;">
        <label>Search (reason / type / status)</label>
        <input id="mySearchText" placeholder="e.g. holiday, medical, leave...">
  
        <label>Filter by date</label>
        <div class="dates">
          <input type="date" id="myFromDate">
          <input type="date" id="myToDate">
        </div>
  
        <label>Status</label>
        <select id="myStatus">
          <option value="">All</option>
          <option value="Pending">Pending</option>
          <option value="Approved">Approved</option>
          <option value="Rejected">Rejected</option>
        </select>
  
        <label>Type</label>
        <select id="myType">
          <option value="">All</option>
          <option value="Leave">Leave</option>
          <option value="Off">Off</option>
        </select>
  
        <button type="button" class="login-btn" id="myClearFilters">Clear Filters</button>
      </div>
  
      <div id="myRequestsList"></div>
    </div>
  </div>

  <!-- Employee Calendar -->
<div id="employeeCalendarSection" class="hidden">
    <div style="margin-top:20px;">
        <h3 style="font-size:18px;font-weight:700;margin-bottom:12px;color:#222;">Leave Calendar</h3>

        <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#6366f1"></div>HQ</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#10b981"></div>Team 1</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f59e0b"></div>Team 2</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ef4444"></div>Team 3</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ccc;outline:2px dashed #999;outline-offset:-2px"></div>Pending</div>
        </div>

        <div class="cal-tabs">
            <button class="cal-tab cal-tab-active" id="empCalTabMonth" onclick="setEmpCalView('month')">Monthly</button>
            <button class="cal-tab" id="empCalTabWeek" onclick="setEmpCalView('week')">Weekly</button>
        </div>

        <div id="employeeCalendarWrap"></div>
    </div>
</div>

<!-- Admin Panel -->
<div id="adminSection" class="card hidden">
    <h2>Admin Approval Panel</h2>

    <!-- Scrollable User List -->
    <div id="UserList" class="scroll-list"></div>

    <!-- Requests -->
    <div id="requests"></div>

    <div id="calendarSection">
        <h3>Leave Calendar</h3>
    
        <!-- Team legend -->
        <div class="cal-legend">
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#6366f1"></div>HQ</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#10b981"></div>Team 1</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#f59e0b"></div>Team 2</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ef4444"></div>Team 3</div>
            <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#ccc;outline:2px dashed #999;outline-offset:-2px"></div>Pending</div>
        </div>
    
        <!-- View toggle -->
        <div class="cal-tabs">
            <button class="cal-tab cal-tab-active" id="calTabMonth" onclick="setCalView('month')">Monthly</button>
            <button class="cal-tab" id="calTabWeek" onclick="setCalView('week')">Weekly</button>
        </div>
    
        <!-- Calendar renders here -->
        <div id="calendarWrap"></div>
    </div>
</div>

<script src="supabase.js"></script>
<script src="pin.js"></script>
<script src="script.js"></script>
<button id="notifBell" onclick="toggleNotifPanel()" style="display:none;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
    </svg>
    <span id="notifBadge" class="notif-badge hidden">0</span>
</button>
<button id="floatingHome" onclick="goHome()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 3l9 8h-3v9h-12v-9h-3z"/>
    </svg>
</button>
<button id="floatingRefresh" onclick="refreshData()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
        <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
    </svg>
</button>


<div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p>Loading...</p>
</div>

<button id="floatingHome" onclick="goHome()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 3l9 8h-3v9h-12v-9h-3z"/>
    </svg>
</button>

<button id="notifBell" onclick="toggleNotifPanel()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
    </svg>
    <span id="notifBadge" class="notif-badge hidden">0</span>
</button>

<div id="notifPanel" class="notif-panel hidden">
    <div class="notif-panel-header">
        <span>Notifications</span>
        <button onclick="markAllRead()" class="notif-mark-all">Mark all read</button>
    </div>
    <div id="notifList" class="notif-list"></div>
</div>

</body>
</html>
